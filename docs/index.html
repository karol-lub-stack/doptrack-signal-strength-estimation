<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DopTrack · Signal Strength Estimation</title>
<meta name="description" content="Per-pass SNR results for the classical spectrogram signal-strength estimator on TU Delft DopTrack recordings.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-head">
  <div class="head-inner">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="34" height="34">
          <path d="M2 22 C8 22 8 10 16 10 C24 10 24 22 30 22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="16" cy="10" r="2.6" fill="currentColor"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>DopTrack — Signal Strength Estimation</h1>
        <p class="tagline">Classical spectrogram SNR estimator · per-pass results gallery</p>
      </div>
    </div>
    <div class="head-meta" id="headMeta"></div>
  </div>
</header>

<main>
  <!-- overview stat cards -->
  <section class="overview" id="overview" aria-label="Per-satellite overview"></section>

  <!-- controls -->
  <section class="controls">
    <div class="filters" id="satFilters"></div>
    <div class="control-right">
      <div class="search">
        <svg viewBox="0 0 20 20" width="15" height="15" aria-hidden="true"><circle cx="9" cy="9" r="6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M14 14 L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="searchBox" type="search" placeholder="search pass id…" autocomplete="off">
      </div>
      <label class="sort">
        sort
        <select id="sortSel">
          <option value="date_desc">newest first</option>
          <option value="date_asc">oldest first</option>
          <option value="peak_desc">peak SNR ↓</option>
          <option value="peak_asc">peak SNR ↑</option>
          <option value="median_desc">median SNR ↓</option>
          <option value="median_asc">median SNR ↑</option>
          <option value="dur_desc">duration ↓</option>
          <option value="name_asc">name A–Z</option>
        </select>
      </label>
    </div>
  </section>

  <div class="result-count" id="resultCount"></div>

  <!-- gallery grid -->
  <section class="grid" id="grid"></section>
  <div class="empty" id="empty" hidden>No passes match your filters.</div>
</main>

<footer class="site-foot">
  <span id="footText"></span>
  <a href="https://github.com/karol-lub-stack/doptrack-signal-strength-estimation" target="_blank" rel="noopener">source on GitHub ↗</a>
</footer>

<!-- modal -->
<div class="modal" id="modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="modal-close" data-close aria-label="Close">✕</button>
    <button class="modal-nav prev" id="navPrev" aria-label="Previous">‹</button>
    <button class="modal-nav next" id="navNext" aria-label="Next">›</button>
    <div class="modal-body">
      <div class="modal-figure">
        <img id="modalImg" alt="">
      </div>
      <aside class="modal-meta">
        <div class="modal-sat" id="modalSat"></div>
        <h2 id="modalTitle"></h2>
        <div class="modal-date" id="modalDate"></div>
        <div class="modal-snr" id="modalSnr"></div>
        <table class="meta-table" id="modalTable"></table>
        <div class="modal-hint">← → to navigate · Esc to close</div>
      </aside>
    </div>
  </div>
</div>

<script src="classical/data.js"></script>
<script src="app.js"></script>
</body>
</html>
